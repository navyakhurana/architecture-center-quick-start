name: Deploy main site to GitHub Pages

on:
  # for local PR builds esp. builds in forked repositories
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Get pages deployment URL
        run: |
          pages_url=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.html_url')
          url=$(echo $pages_url|cut -d'/' -f 1)//$(echo $pages_url|cut -d'/' -f 3)
          base_url=$(echo $pages_url|cut -d'/' -f 4)
          echo "url=$url" >> "$GITHUB_ENV"
          echo "base_url=$base_url" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch docusaurus.config.ts
        run: |
          sed -E -i "s^url:(..*)^url: '${{ env.url }}',^g" docusaurus.config.ts
          sed -E -i "s^const baseUrl = '(.*)';^const baseUrl = '/${{ env.base_url }}';^g" docusaurus.config.ts

      - name: Fetch contributors details from GitHub API
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: node src/_scripts/_fetch-contributors-details.js

      - name: Cache drawio svgs
        uses: actions/cache@v4
        with:
          path: ~/.cache/architecture-center/drawio-svgs
          key: drawio-svgs-runner-${{ runner.os }}-branch-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            drawio-svgs-runner-${{ runner.os }}-branch-${{ github.ref_name }}-

      - name: Export drawios to svgs
        run: CACHE_ENABLED=1 DOCKER=1 node src/_scripts/_export-drawios.js

      - name: Build Website
        run: npm run build

      - name: Update drawio links with hashed URLs
        run: node src/_scripts/_update-drawio-links.js

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build

      - name: Ensure site branch exists
        run: |
          git fetch origin site || git checkout -b site
          git checkout site

      - name: Deploy to GitHub Pages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          cp -r build/* .
          git add --all

          if ! git diff --cached --quiet; then
            git commit -m "Deploy to GitHub Pages"
            git push origin site --force
          else
            echo "No changes to deploy"
          fi