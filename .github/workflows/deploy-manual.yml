name: Deploy main site to GitHub Pages

on:
  # for local PR builds esp. builds in forked repositories
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    env:
      VALIDATOR_API_URL: ${{ secrets.VALIDATOR_API_URL }}
      BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
      EXPRESS_BACKEND_URL: ${{ secrets.EXPRESS_BACKEND_URL }}
      VALIDATOR_RULES_API_URL: ${{ secrets.VALIDATOR_RULES_API_URL }}
      VALIDATOR_OAUTH_AUTH_URL: ${{ secrets.VALIDATOR_OAUTH_AUTH_URL }}
      VALIDATOR_OAUTH_CLIENT_ID: ${{ secrets.VALIDATOR_OAUTH_CLIENT_ID }}
      VALIDATOR_OAUTH_CLIENT_SECRET: ${{ secrets.VALIDATOR_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Get pages deployment URL
        run: |
          pages_url=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.html_url')
          url=$(echo $pages_url|cut -d'/' -f 1)//$(echo $pages_url|cut -d'/' -f 3)
          base_url=$(echo $pages_url|cut -d'/' -f 4)
          echo "url=$url" >> "$GITHUB_ENV"
          echo "base_url=$base_url" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch docusaurus.config.ts
        run: |
          sed -E -i "s^url:(..*)^url: '${{ env.url }}',^g" docusaurus.config.ts
          sed -E -i "s^const baseUrl = '(.*)';^const baseUrl = '/${{ env.base_url }}';^g" docusaurus.config.ts

      - name: Fetch contributors details from GitHub API
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: node src/_scripts/_fetch-contributors-details.js

      - name: Cache drawio svgs
        uses: actions/cache@v4
        with:
          path: ~/.cache/architecture-center/drawio-svgs
          key: drawio-svgs-runner-${{ runner.os }}-branch-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            drawio-svgs-runner-${{ runner.os }}-branch-${{ github.ref_name }}-

      - name: Export drawios to svgs
        run: CACHE_ENABLED=1 DOCKER=1 node src/_scripts/_export-drawios.js

      - name: Generate validation rules
        run: node src/_scripts/_generate-validator-rules.js

      - name: Build Website
        run: npm run build

      - name: Update drawio links with hashed URLs
        run: node src/_scripts/_update-drawio-links.js

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAASAPCOM_PAT }}

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          path: __build__

      - name: Set up Git
        run: |
          git config --global user.email "paa@sap.com"
          git config --global user.name "paasapcom"

      - name: Switch to Pages Branch
        run: |
          gh_pages_branch=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.source.branch')
          git fetch origin $gh_pages_branch
          git checkout $gh_pages_branch
          echo "gh_pages_branch=$gh_pages_branch" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Drop Previous Content
        run: |
          shopt -s extglob
          rm -rf !(@*|__build__)

      - name: Extract Build Content
        run: |
          if [[ -d "__build__" && "$(ls -A __build__)" ]]; then
            mv __build__/* ./
            tar -xvf github-pages/artifact.tar
            rm github-pages/artifact.tar
            rm -rf __build__
          else
            echo "No build files found. Skipping move step."
          fi

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.PAASAPCOM_PAT }}
        # prevent history build-up and .git bloat with orphan
        run: |
          git checkout --orphan site-anew
          git add -A
          if [[ "$(git status -s)" ]]; then
            git commit -m "site build ➝ gh pages"
            git push -f origin HEAD:${{ env.gh_pages_branch }}
          fi
